name: Release

# Publish the Tampermonkey userscript only when a version tag is pushed.
# main holds source; the `release` branch holds the stable install artifact.
#
# Security: build/test run with contents:read only; publish job alone gets write.
on:
  push:
    tags:
      - 'v*'

# Serialize publishes so an older tag cannot finish after a newer one and downgrade release.
concurrency:
  group: userscript-release
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure tag commit is on main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Refusing to release: $GITHUB_SHA is not an ancestor of origin/main"
            exit 1
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build userscript
        run: npm run build

      - name: Read package version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ "${TAG}" != "v${VERSION}" ]; then
            echo "Tag ${TAG} does not match package.json version v${VERSION}"
            exit 1
          fi

      - name: Upload userscript artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: userscript
          path: userscript/ccswitch-linuxdo-importer.user.js
          if-no-files-found: error

    outputs:
      version: ${{ steps.pkg.outputs.version }}
      tag: ${{ steps.pkg.outputs.tag }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          # Keep credentials for authenticated push to the release branch.
          persist-credentials: true

      - name: Download userscript artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: userscript
          path: userscript

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      # Needed for scripts/release-guard.mjs (semver + sha256 compare). No tests run here.
      - name: Install (release guard only)
        run: npm ci

      - name: Publish userscript to release branch
        env:
          VERSION: ${{ needs.build.outputs.version }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          ARTIFACT="userscript/ccswitch-linuxdo-importer.user.js"
          test -f "$ARTIFACT"

          CURRENT_FILE=""
          CURRENT_VERSION=""
          if git fetch origin release:refs/remotes/origin/release 2>/dev/null; then
            CURRENT_FILE=$(mktemp)
            if git show origin/release:userscript/ccswitch-linuxdo-importer.user.js >"$CURRENT_FILE" 2>/dev/null; then
              CURRENT_VERSION=$(sed -n 's/^\/\/ @version[[:space:]]*//p' "$CURRENT_FILE" | head -n1 | tr -d '\r')
            else
              rm -f "$CURRENT_FILE"
              CURRENT_FILE=""
            fi
          fi

          if [ -n "${CURRENT_FILE}" ]; then
            node scripts/release-guard.mjs "$CURRENT_VERSION" "$VERSION" "$CURRENT_FILE" "$ARTIFACT"
          else
            node scripts/release-guard.mjs "" "$VERSION" - "$ARTIFACT"
          fi
          rm -f "${CURRENT_FILE:-}"

          WORKDIR=$(mktemp -d)
          if git show-ref --verify --quiet refs/remotes/origin/release; then
            git worktree add "$WORKDIR" origin/release
          else
            git worktree add --detach "$WORKDIR"
            git -C "$WORKDIR" checkout --orphan release
            git -C "$WORKDIR" rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p "$WORKDIR/userscript"
          cp "$ARTIFACT" "$WORKDIR/userscript/ccswitch-linuxdo-importer.user.js"
          {
            echo '# CC Switch Importer — release artifacts'
            echo
            echo 'Stable Tampermonkey install target. Do not develop here.'
            echo
            echo '- Install: [ccswitch-linuxdo-importer.user.js](./userscript/ccswitch-linuxdo-importer.user.js)'
            echo '- Source: https://github.com/Super-YYQ/ccswitch-linuxdo-importer (main)'
            echo "- Version: ${VERSION}"
            echo "- Tag: ${TAG}"
          } > "$WORKDIR/README.md"
          git -C "$WORKDIR" config user.name "github-actions[bot]"
          git -C "$WORKDIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$WORKDIR" add -A
          if git -C "$WORKDIR" diff --cached --quiet; then
            echo "No userscript changes to publish"
          else
            git -C "$WORKDIR" commit -m "release: userscript v${VERSION}"
            git -C "$WORKDIR" push origin HEAD:release
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: v${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: userscript/ccswitch-linuxdo-importer.user.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
