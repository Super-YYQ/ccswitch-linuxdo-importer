name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Test
        run: npm test
      - name: Build userscript
        run: npm run build
      - name: Ensure committed userscript matches build
        run: git diff --exit-code -- userscript/ccswitch-linuxdo-importer.user.js
